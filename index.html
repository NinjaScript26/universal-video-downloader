<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Universal Video Downloader</title>
<style>
  :root { color-scheme: dark }
  body { font: 15px/1.5 system-ui, sans-serif; background: #0f1115; color: #e6e6e6;
         max-width: 720px; margin: 40px auto; padding: 0 16px }
  h1 { font-size: 1.4rem } h1 small { color: #8a8f98; font-weight: 400; font-size: .9rem }
  fieldset { border: 1px solid #2a2f3a; border-radius: 10px; margin: 12px 0; padding: 12px 14px }
  legend { color: #8a8f98; padding: 0 6px }
  input[type=url], input[type=number], select {
    background: #171a21; color: inherit; border: 1px solid #2a2f3a; border-radius: 8px;
    padding: 9px 10px; font: inherit }
  input[type=url] { width: 100% }
  label { margin-right: 14px }
  button { font: inherit; border: 0; border-radius: 8px; padding: 10px 18px; cursor: pointer }
  #go { background: #3b82f6; color: #fff } #go:disabled { opacity: .5; cursor: default }
  #stop { background: #2a2f3a; color: #e6e6e6; display: none }
  pre { background: #0a0c10; border: 1px solid #2a2f3a; border-radius: 10px; padding: 12px;
        min-height: 120px; max-height: 45vh; overflow: auto; white-space: pre-wrap;
        word-break: break-all; font-size: 13px }
  footer { color: #8a8f98; font-size: .8rem; margin-top: 24px }
  .batch-only { display: none } .batch .batch-only { display: inline }
</style>

<h1>Universal Video Downloader <small>YouTube · Facebook · Instagram · LinkedIn · <a href="https://github.com/yt-dlp/yt-dlp/blob/master/supportedsites.md" style="color:#8a8f98">1800+ sites</a></small></h1>

<fieldset>
  <legend>Link</legend>
  <input type="url" id="url" placeholder="Paste a video, short, reel, channel or playlist link…" autofocus>
  <p>
    <label><input type="radio" name="mode" value="single" checked> Single video / short / reel</label>
    <label><input type="radio" name="mode" value="batch"> Entire channel / playlist / shorts / reels feed</label>
    <span class="batch-only"><label>Max videos <input type="number" id="limit" min="1" placeholder="all" style="width:70px"></label></span>
  </p>
</fieldset>

<fieldset>
  <legend>Options</legend>
  <label>Quality
    <select id="quality">
      <option value="best">Best available</option>
      <option value="1080">1080p</option>
      <option value="720">720p</option>
      <option value="480">480p</option>
      <option value="mp3">MP3 (audio only)</option>
    </select>
  </label>
  <label>Login cookies
    <select id="cookies" title="Needed for private or login-gated content (Instagram, Facebook, LinkedIn). Uses the logged-in session of your own browser.">
      <option value="">none</option>
      <option>chrome</option><option>firefox</option><option>edge</option>
      <option>brave</option><option>chromium</option><option>opera</option><option>safari</option>
    </select>
  </label>
</fieldset>

<p>
  <button id="go">Download</button>
  <button id="stop">Cancel</button>
</p>

<pre id="log">Files are saved to the downloads/ folder next to app.py</pre>

<footer>Educational use only — download only content you have the right to download,
and respect each platform's Terms of Service. Open source (MIT).</footer>

<script>
const $ = id => document.getElementById(id);
let aborter;

document.querySelectorAll('[name=mode]').forEach(r =>
  r.onchange = () => document.body.classList.toggle('batch', r.value === 'batch' && r.checked));

$('go').onclick = async () => {
  const body = {
    url: $('url').value,
    mode: document.querySelector('[name=mode]:checked').value,
    quality: $('quality').value,
    cookies: $('cookies').value,
    limit: $('limit').value || null,
  };
  $('log').textContent = '';
  $('go').disabled = true;
  $('stop').style.display = 'inline';
  aborter = new AbortController();
  try {
    const res = await fetch('/download', {
      method: 'POST', body: JSON.stringify(body), signal: aborter.signal });
    if (!res.ok) { $('log').textContent = await res.text(); return; }
    const reader = res.body.getReader(), dec = new TextDecoder();
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      // yt-dlp progress lines start with \r-like updates; keep last 500 lines
      const lines = ($('log').textContent + dec.decode(value)).split('\n');
      $('log').textContent = lines.slice(-500).join('\n');
      $('log').scrollTop = $('log').scrollHeight;
    }
  } catch (e) {
    $('log').textContent += e.name === 'AbortError' ? '\n== cancelled ==' : '\n' + e;
  } finally {
    $('go').disabled = false;
    $('stop').style.display = 'none';
  }
};

$('stop').onclick = () => aborter?.abort();
</script>
